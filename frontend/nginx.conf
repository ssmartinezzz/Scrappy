# Fashion Scraper Argentina — nginx config for the frontend Docker image
# (docker-install-alternative). SPA fallback so client-side routes (e.g.
# /catalogo, /picks/:categoria) resolve to index.html instead of 404.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
