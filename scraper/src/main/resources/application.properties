server.port=3000
spring.application.name=fashion-scraper

# Logback maneja todo desde logback-spring.xml
# La consola muestra lo minimo durante arranque de Spring
logging.level.root=WARN
logging.level.ar.scraper=INFO

# ─── PostgreSQL / HikariCP (decouple-services-postgres, Batch 1, design D1/D6) ──
# Env-only configuration (D6/spec "Environment-Only Configuration"): NO defaults
# here — an unset DATABASE_URL/USERNAME/PASSWORD fails startup fast, rejected
# by RequiredEnvVarsGuard (ar.scraper.config) before any bean is created, or
# by an unresolved-placeholder error if the guard is somehow bypassed. Local
# dev convenience fallbacks live in application-dev.properties, active only
# via SPRING_PROFILES_ACTIVE=dev. Batch 4's installer provisions _tools/pgsql
# and writes a real DATABASE_URL into the generated .env consumed by the
# launcher — no fallback needed there either.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# Flyway holds the full 15-table baseline (V1__baseline.sql) + write-path stored
# procedures; replaces the old initEn()/crearTablas()/migrarColumna() runtime bootstrap.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── CORS (decouple-services-postgres, Batch 3, design D6) ──────────────────
# Backend is now API-only (SpaController/static/ removed); frontend is a
# separate service. Comma-separated origin allow-list, env-driven, NO default
# here (see the note above the datasource block) — dev fallback lives in
# application-dev.properties.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
