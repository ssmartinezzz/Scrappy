server.port=3000
spring.application.name=fashion-scraper

# Logback maneja todo desde logback-spring.xml
# La consola muestra lo minimo durante arranque de Spring
logging.level.root=WARN
logging.level.ar.scraper=INFO

# ─── PostgreSQL / HikariCP (decouple-services-postgres, Batch 1, design D1/D6) ──
# Env-only configuration (D6/spec "Environment-Only Configuration"): no defaults
# to a silently-missing resource in prod. The localhost fallback below is a local
# dev convenience only — Batch 4's installer provisions _tools/pgsql and writes a
# real DATABASE_URL into the generated .env consumed by the launcher.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/scraper}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# Flyway holds the full 15-table baseline (V1__baseline.sql) + write-path stored
# procedures; replaces the old initEn()/crearTablas()/migrarColumna() runtime bootstrap.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── CORS (decouple-services-postgres, Batch 3, design D6) ──────────────────
# Backend is now API-only (SpaController/static/ removed); frontend is a
# separate service. Comma-separated origin allow-list, env-driven. Local dev
# default is the Vite dev server's default origin (task 3.1 spike outcome);
# prod deployments MUST override with the real frontend origin(s).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
