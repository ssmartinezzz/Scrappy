# decouple-services-postgres scoped correction (verify-report CRITICAL-1) —
# dev-only convenience fallbacks. Active ONLY when SPRING_PROFILES_ACTIVE=dev
# is set explicitly. The default profile (application.properties) has NO
# fallbacks for these keys and fails startup fast via RequiredEnvVarsGuard.
#
# Values here match what a local portable Postgres (_tools/pgsql, initdb -A
# trust) and the Vite dev server default to, so `SPRING_PROFILES_ACTIVE=dev
# mvn spring-boot:run` (or an IDE run config with that env var) works without
# hand-setting every var. The installer-generated .env (INSTALAR_Y_CORRER.bat
# / Ejecutar_instalar.sh) does NOT rely on this profile — it always sets the
# real vars explicitly (including an intentionally-empty DATABASE_PASSWORD for
# trust-auth, which RequiredEnvVarsGuard treats as "present", not "missing").
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/scraper}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
