# Fashion Scraper Argentina — docker-install-alternative
#
# Additive bring-up path: `docker compose up` starts postgres + backend +
# frontend, all mutually reachable. Does not replace or modify
# INSTALAR_Y_CORRER.bat / Ejecutar_instalar.sh / menu.ps1 / menu.sh.
#
# Copy docker.env.example to .env (gitignored) before running, or export the
# same vars in your shell. See docker.env.example for the full documented
# list (functionally what the design calls ".env.docker" — see that file's
# header comment for why it is committed under this filename instead).
#
# External Postgres override: to point at an external/managed Postgres
# instance instead of the bundled `postgres` service below, either
# 1) create docker-compose.override.yml (see docker-compose.override.yml.example)
#    that removes the `postgres` service and backend's `depends_on`, or
# 2) leave the bundled service running but simply set DATABASE_URL/
#    DATABASE_USERNAME/DATABASE_PASSWORD in your .env to the external host —
#    the backend does not require the bundled service to be the one it talks
#    to, it only requires the env vars to resolve to a reachable Postgres.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scraper}
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${POSTGRES_DB:-scraper}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/scraper}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      SCRAPER_MODELS_ROOT: /models
      HF_HOME: /models/marqo
      LOG_DIR: /app/logs
    ports:
      - "3000:3000"
    volumes:
      - models:/models
      - logs:/app/logs
    # 8 parallel Chromium instances (~150-300MB each) + JVM + CPU torch;
    # tune per host if scraper.threads.paralelos changes.
    mem_limit: 3g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
  models:
  logs:
